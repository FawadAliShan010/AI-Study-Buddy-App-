name: ai_study_buddy
description: An AI-powered study companion with futuristic design
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase - Using compatible versions for web
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1


  # UI & Animation
  google_fonts: ^8.2.0
  flutter_svg: ^2.0.9
  lottie: ^3.1.0
  shimmer: ^3.0.0
  glassmorphism: ^3.0.0
  animate_do: ^5.1.0

  # State Management
  provider: ^6.0.5

  # Storage
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0

  # Networking
  http: ^1.6.0
  dio: ^5.10.0

  # Utils
  image_picker: ^1.0.4
  file_picker: ^8.0.0
  intl: ^0.20.3
  url_launcher: ^6.1.14

  # AI & ML
  speech_to_text: ^7.4.0

  # Authentication
  sign_in_with_apple: ^8.1.0
  google_sign_in: ^7.2.0
  local_auth: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1

dependency_overrides:

  file_picker: ^8.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/